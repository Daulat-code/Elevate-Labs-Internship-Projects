<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head(title='My Applications')"></head>
<body>
<h2>My Applications</h2>
<table>
<thead><tr><th>Job</th><th>Employer</th><th>Status</th><th>Applied</th></tr></thead>
<tbody>
<tr th:each="a : ${apps}">
<td th:text="${a.job.title}"></td>
<td th:text="${a.job.employer.username}"></td>
<td th:text="${a.status}"></td>
<td th:text="${a.appliedAt}"></td>
</tr>
</tbody>
</table>
</body>
</html>
